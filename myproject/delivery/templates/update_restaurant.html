<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: url('https://source.unsplash.com/featured/?restaurant,food') no-repeat center center fixed;
            background-size: cover;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
        }

        .form-container h3 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #4caf50;
            text-align: center;
        }

        label {
            display: block;
            font-size: 16px;
            margin-bottom: 5px;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus {
            border-color: #4caf50;
            outline: none;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.2);
        }

        button {
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            padding: 10px 20px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background-color: #388e3c;
            transform: translateY(-2px);
        }

        button:active {
            background-color: #2e7d32;
            transform: translateY(0px);
        }
    </style>
</head>
<body>
    <form  action="{% url 'update_restaurant' restaurant_id}" method="post">
        <label>Restaurant name </label>
        <input type="text" name="name" value="{{restaurant.name}}">
        <br><br>
        <label>Picture url </label>
        <input type="text" name="picture" value="{{restaurant.picture}}">
        <br><br>
        <label>Cuisine </label>
        <input type="text" name="cuisine" value="{{restaurant.cuisine}}">
        <br><br>
        <label>Rating</label>
        <input type="number" name="rating" min="0" max="5" step="0.5" value="{{restaurant.rating}}">
        <br><br>
        <br><br>
        <button type="submit">Update Restaurant</button>
    </form>
</body>
</html>
