<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Bunny Features</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            height: 100vh;
            background: url('https://source.unsplash.com/featured/?food,restaurant') no-repeat center center fixed;
            background-size: cover;
        }

        /* Sidebar styling */
        .sidebar {
            height: 100%;
            width: 250px;
            position: fixed;
            top: 0;
            left: -250px;
            background-color: #333;
            overflow-x: hidden;
            transition: 0.3s;
            padding: 10px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.4);
        }

        .sidebar a {
            padding: 10px 15px;
            text-decoration: none;
            font-size: 18px;
            color: #fff;
            display: block;
            margin-bottom: 10px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        .sidebar a:hover {
            background-color: #575757;
        }

        .sidebar .close-btn {
            font-size: 24px;
            color: white;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
        }

        .open-sidebar-btn {
            font-size: 18px;
            cursor: pointer;
            background-color: #4caf50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            position: fixed;
            top: 20px;
            left: 20px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        .open-sidebar-btn:hover {
            background-color: #388e3c;
        }

        /* Main content */
        .content {
            margin-left: 50px;
            text-align: center;
            position: relative;
            top: 50%;
            transform: translateY(-50%);
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            margin: 0 auto;
        }

        .container h3 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #4caf50;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            font-size: 18px;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            background-color: #4caf50;
            margin: 10px 0;
            transition: all 0.3s ease;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            background-color: #388e3c;
            box-shadow: 0px 6px 14px rgba(0, 0, 0, 0.2);
        }

    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <span class="close-btn" onclick="toggleSidebar()">×</span>
    <a href="#">➰ Bunny Dashboard</a>
    <a href="#">🐰 Add New Bunny</a>
    <a href="#">📖 Bunny Details</a>
    <a href="#">🎉 Bunny Events</a>
    <a href="#">📊 Bunny Analytics</a>
</div>

<!-- Open Sidebar Button -->
<button class="open-sidebar-btn" onclick="toggleSidebar()">☰ Features</button>

<!-- Main Content -->
<div class="content">
    <div class="container">
        <h3>Welcome to Admin HOME!</h3>
        <div class="btn-container">
            <a href="open_add_restaurant" class="btn">Add New Restaurant</a>
            <br>
            <a href="open_show_restaurant" class="btn">Show Restaurants</a>
        </div>
    </div>
</div>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        if (sidebar.style.left === '0px') {
            sidebar.style.left = '-250px';
        } else {
            sidebar.style.left = '0px';
        }
    }
</script>

</body>
</html>
